name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Add iOS platform (allow pod install to fail)
        run: npx cap add ios
        continue-on-error: true

      - name: Find and patch Podfile
        run: |
          find . -name Podfile | head -20
          PODFILE=$(find . -name Podfile | grep -v node_modules | head -1)
          echo "Patching: $PODFILE"
          sed -i '' "s/platform :ios, '[^']*'/platform :ios, '14.0'/" "$PODFILE"
          cat "$PODFILE" | head -5

      - name: Install CocoaPods dependencies
        run: |
          cd ios/App
          pod install

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""

      - name: Package as IPA
        run: |
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$RUNNER_TEMP/App.xcarchive/Products/Applications/App.app" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r LPISim.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LPISim-iOS
          path: ${{ runner.temp }}/LPISim.ipa
          retention-days: 30
